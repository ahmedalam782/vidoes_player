name: adaptive_video_player
description: "A Flutter video player package that seamlessly handles both YouTube videos and direct video URLs with adaptive player selection. Supports Android, iOS, Windows, and Web."
version: 1.1.0
homepage: https://github.com/ahmedalam782/vidoes_player
repository: https://github.com/ahmedalam782/vidoes_player
issue_tracker: https://github.com/ahmedalam782/vidoes_player/issues

environment:
  sdk: ">=3.1.0 <4.0.0"

topics:
  - video-player
  - youtube
  - streaming
  - hls
  - cross-platform
  - flutter-desktop

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_inappwebview: ^6.1.5
  url_launcher: ^6.3.2
  video_player: ^2.11.0
  video_player_win: ^3.2.2
  web: ^1.1.1
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/youtube_player.html
