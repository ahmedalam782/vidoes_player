name: adaptive_video_player
description: "A comprehensive Flutter video player package that seamlessly handles both YouTube videos and direct video URLs with adaptive player selection. Supports Android, iOS, Windows, and Web."
version: 1.0.0
homepage: https://github.com/ahmedalam782/vidoes_player
repository: https://github.com/ahmedalam782/vidoes_player
issue_tracker: https://github.com/ahmedalam782/vidoes_player/issues

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  chewie: ^1.13.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_inappwebview: ^6.1.5
  video_player: ^2.11.0
  video_player_win: ^3.2.2
  youtube_player_flutter: ^9.1.3

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/youtube_player.html
